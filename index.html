<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
:root {
    --accent: #00f5ff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0a0f1c 0%, #1a1f3a 100%);
    color: white;
    overflow-x: hidden;
    min-height: 100vh;
}

/* Animated Background Glow */
body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 50% 20%, rgba(0, 245, 255, 0.15), transparent 60%);
    pointer-events: none;
    z-index: -1;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 20px;
    position: relative;
}

.hero h1 {
    font-size: 5.8rem;
    font-weight: 800;
    margin-bottom: 20px;
    letter-spacing: -3px;
    background: linear-gradient(90deg, #ffffff, var(--accent), #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    font-size: 1.5rem;
    max-width: 600px;
    margin: 0 auto 50px;
    color: #b0d4ff;
    line-height: 1.6;
}

/* Main Button - Much Better Now */
.main-btn {
    padding: 20px 55px;
    font-size: 1.4rem;
    font-weight: 700;
    border: none;
    border-radius: 60px;
    background: linear-gradient(90deg, #00f5ff, #00b8ff);
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 15px 40px rgba(0, 245, 255, 0.4);
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}

.main-btn:hover {
    transform: scale(1.1) translateY(-8px);
    box-shadow: 0 25px 55px rgba(0, 245, 255, 0.6);
}

.main-btn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 40%;
    height: 300%;
    background: rgba(255,255,255,0.4);
    transform: rotate(30deg);
    transition: all 0.6s;
    opacity: 0;
}

.main-btn:hover::after {
    left: 120%;
    opacity: 1;
}

/* Theme Toggle */
.theme-toggle {
    position: fixed;
    top: 25px;
    right: 30px;
    z-index: 1000;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 50px;
    backdrop-filter: blur(10px);
}

/* Popup Styling */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup-box {
    width: 440px;
    background: rgba(15, 23, 42, 0.95);
    padding: 45px 35px;
    border-radius: 28px;
    border: 1px solid rgba(0, 245, 255, 0.3);
    text-align: center;
    max-height: 90vh;
    overflow-y: auto;
}

.tool-btn {
    width: 100%;
    padding: 20px;
    margin: 12px 0;
    border: none;
    border-radius: 16px;
    background: rgba(30, 41, 59, 0.9);
    color: white;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.tool-btn:hover {
    background: var(--accent);
    color: black;
    transform: translateX(10px);
}

.tool-btn i {
    font-size: 28px;
    width: 35px;
}
</style>
</head>
<body>

<!-- Theme Toggle -->
<div class="theme-toggle">
    <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
    </label>
</div>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Nova <span>AI</span></h1>
        <p>Powerful AI tools that help you think, create, and achieve more</p>
        <button class="main-btn" id="startBtn">
            <i class="fas fa-bolt"></i>
            Start Chatting
        </button>
    </div>
</section>

<!-- TOOL MENU -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h2 style="margin-bottom:30px; font-size:2rem;">Choose AI Tool</h2>
        
        <button class="tool-btn" onclick="openPalAI()">
            <i class="fas fa-robot"></i> Pal AI
        </button>
        <button class="tool-btn" onclick="openFitnessAI()">
            <i class="fas fa-dumbbell"></i> Fitness & Weight Loss AI
        </button>
        <button class="tool-btn" onclick="openTravelAI()">
            <i class="fas fa-plane"></i> Travel Route Architect
        </button>
        <button class="tool-btn" onclick="openSynapseAI()">
            <i class="fas fa-laptop-code"></i> Synapse X AI Engineer
        </button>

        <button onclick="closePopup()" style="margin-top:25px; width:100%; padding:16px; background:#334155; border:none; border-radius:12px; color:white; font-size:1.1rem; cursor:pointer;">
            Close
        </button>
    </div>
</div>

<script>
// Basic functionality
document.getElementById("startBtn").addEventListener("click", () => {
    document.getElementById("popup").style.display = "flex";
});

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function openPalAI(){ closePopup(); window.open("https://chatbot.getmindpal.com/smart-pal-ik1", "_blank"); }
function openTravelAI(){ closePopup(); window.open("https://chatbot.getmindpal.com/travel-route-architect-so0", "_blank"); }
function openSynapseAI(){ closePopup(); window.open("https://chatbot.getmindpal.com/synapse-x-elite-ai-software-engineer-7fh", "_blank"); }
function openFitnessAI(){ 
    closePopup(); 
    alert("Fitness AI opened! (Add your fitness popup here)"); 
}
</script>
</body>
</html>
