<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
:root {
    --bg: #0b1020;
    --card: #111827;
    --text: white;
    --accent: #00d4ff;
    --input-bg: #1f2937;
    --secondary: #374151;
}

.light-mode {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --accent: #0088aa;
    --input-bg: #f1f5f9;
    --secondary: #e2e8f0;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }

body {
    background:var(--bg);
    color:var(--text);
    transition: background 0.4s;
}

/* Theme Toggle */
.theme-toggle {
    position: fixed;
    top: 25px;
    right: 30px;
    z-index: 10000;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.3);
    padding: 8px 14px;
    border-radius: 50px;
}
.light-mode .theme-toggle { background: rgba(255,255,255,0.7); }

.switch {
    position: relative;
    display: inline-block;
    width: 55px;
    height: 28px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #334155;
    transition: .4s;
    border-radius: 50px;
}
.slider:before {
    position: absolute;
    content: "";
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background: white;
    transition: .4s;
    border-radius: 50%;
}
input:checked + .slider { background: #00d4ff; }
input:checked + .slider:before { transform: translateX(27px); }

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}
.hero h1{
    font-size:65px;
    margin-bottom:20px;
}
.hero span{ color:var(--accent); }

/* POPUP - Improved for 4 tools */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
.popup-box{
    width:420px;
    max-height:92vh;
    background:var(--card);
    color:var(--text);
    padding:40px 30px;
    border-radius:24px;
    text-align:center;
    overflow-y:auto;
    box-shadow:0 25px 50px rgba(0, 212, 255, 0.2);
}
.popup-box h2{
    margin-bottom:30px;
    color:var(--accent);
    font-size:29px;
}
.tool-btn{
    width:100%;
    padding:18px 20px;
    margin:10px 0;
    border:none;
    border-radius:14px;
    background:#1f2937;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:all 0.3s ease;
    display:flex;
    align-items:center;
    gap:15px;
    text-align:left;
}
.light-mode .tool-btn {
    background: #e2e8f0;
    color: #0f172a;
}
.tool-btn:hover{
    background:var(--accent);
    color:black;
    transform:scale(1.03) translateY(-3px);
}
.tool-btn i{ font-size:24px; width:32px; }

.close-btn{
    width:100%;
    padding:15px;
    margin-top:25px;
    border:none;
    border-radius:12px;
    background:var(--secondary);
    color:var(--text);
    font-size:16px;
    cursor:pointer;
}
.close-btn:hover{ background:#64748b; }

/* Fitness Popup Styles */
.fitness-popup{
    position:fixed;
    inset:0;
    background:var(--bg);
    display:none;
    z-index:10000;
    overflow-y:auto;
}
.topbar{
    background:var(--card);
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.topbar h2{ color:var(--accent); }
.input-group input,
.input-group select{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--input-bg);
    color:var(--text);
    margin-top:5px;
}
.generate-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:var(--accent);
    color:black;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}
.result{
    margin-top:40px;
    background:var(--card);
    padding:30px;
    border-radius:20px;
    display:none;
}
</style>
</head>
<body>

<!-- Theme Toggle -->
<div class="theme-toggle">
    <i class="fas fa-sun" style="color:#facc15;"></i>
    <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
    </label>
    <i class="fas fa-moon" style="color:#94a3b8;"></i>
</div>

<!-- HERO -->
<section class="hero">
<div>
    <h1>Nova <span>AI</span></h1>
    <p>Your all-in-one AI platform</p>
    <button class="btn" id="startBtn">Start Chatting</button>
</div>
</section>

<!-- TOOL MENU -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h2>Choose AI Tool</h2>
        
        <button class="tool-btn" onclick="openPalAI()">
            <i class="fas fa-robot"></i>
            <span>Pal AI</span>
        </button>
        
        <button class="tool-btn" onclick="openFitnessAI()">
            <i class="fas fa-dumbbell"></i>
            <span>Fitness & Weight Loss AI</span>
        </button>
        
        <button class="tool-btn" onclick="openTravelAI()">
            <i class="fas fa-plane"></i>
            <span>Travel Route Architect</span>
        </button>
        
        <button class="tool-btn" onclick="openSynapseAI()">
            <i class="fas fa-laptop-code"></i>
            <span>Synapse X - AI Engineer</span>
        </button>

        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<!-- FITNESS AI -->
<div class="fitness-popup" id="fitnessPopup">
    <div class="topbar">
        <h2>NovaFit AI</h2>
        <button onclick="closeFitnessAI()">Close</button>
    </div>
    <div class="fitness-container">
        <div class="input-group">
            <label>Age</label>
            <input type="number" id="age">
        </div>
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight">
        </div>
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height">
        </div>
        <div class="input-group">
            <label>Goal</label>
            <select id="goal">
                <option>Lose Weight</option>
                <option>Build Muscle</option>
                <option>Maintain Weight</option>
            </select>
        </div>
        <button class="generate-btn" onclick="generatePlan()">Generate AI Plan</button>
        <div class="result" id="result"></div>
    </div>
</div>

<script>
// Theme Toggle
const toggle = document.getElementById('themeToggle');
if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light-mode');
    toggle.checked = true;
}
toggle.addEventListener('change', () => {
    if (toggle.checked) {
        document.body.classList.add('light-mode');
        localStorage.setItem('theme', 'light');
    } else {
        document.body.classList.remove('light-mode');
        localStorage.setItem('theme', 'dark');
    }
});

// Menu Controls
document.getElementById("startBtn").addEventListener("click", () => {
    document.getElementById("popup").style.display = "flex";
});

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

// Tool Functions
function openPalAI(){
    closePopup();
    window.open("https://chatbot.getmindpal.com/smart-pal-ik1", "_blank");
}

function openFitnessAI(){
    closePopup();
    document.getElementById("fitnessPopup").style.display = "block";
}

function closeFitnessAI(){
    document.getElementById("fitnessPopup").style.display = "none";
}

function openTravelAI(){
    closePopup();
    window.open("https://chatbot.getmindpal.com/travel-route-architect-so0", "_blank");
}

function openSynapseAI(){
    closePopup();
    window.open("https://chatbot.getmindpal.com/synapse-x-elite-ai-software-engineer-7fh", "_blank");
}

function generatePlan(){ /* your existing function */ 
    // ... (same as before)
    alert("Fitness plan generated! (Check console for now)");
}
</script>
</body>
</html>
