<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1020;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 10%;
    background:#111827;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#00d4ff;
}

/* HERO */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:65px;
    margin-bottom:20px;
}

.hero span{
    color:#00d4ff;
}

.hero p{
    max-width:700px;
    margin:auto;
    line-height:1.7;
    margin-bottom:30px;
    color:#ccc;
}

.btn{
    padding:16px 35px;
    border:none;
    border-radius:40px;
    background:#00d4ff;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

/* POPUPS */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    background:#111827;
    width:350px;
    padding:35px;
    border-radius:20px;
    text-align:center;
}

.popup-box h2{
    margin-bottom:20px;
}

.tool-btn{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00d4ff;
    color:black;
    font-size:18px;
    cursor:pointer;
}

.close-btn{
    width:100%;
    padding:13px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    cursor:pointer;
}

/* IFRAME POPUP */

.iframe-popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    z-index:10000;
}

.iframe-top{
    height:60px;
    background:#111827;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
}

.iframe-top h2{
    color:white;
}

.iframe-top button{
    background:red;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

iframe{
    width:100%;
    height:calc(100% - 60px);
    border:none;
}

/* FOOTER */

footer{
    background:#111827;
    text-align:center;
    padding:40px;
}

</style>
</head>
<body>

<!-- NAVBAR -->

<nav>

    <div class="logo">
        Nova AI
    </div>

</nav>

<!-- HERO -->

<section class="hero">

    <div>

        <h1>
            Your Smart <span>AI Assistant</span>
        </h1>

        <p>
            Experience futuristic AI tools and intelligent assistants.
        </p>

        <button class="btn" id="startBtn">
            Start Chatting
        </button>

    </div>

</section>

<!-- TOOL MENU -->

<div id="toolsPopup" class="popup">

    <div class="popup-box">

        <h2>AI Tools</h2>

        <button class="tool-btn" onclick="openDoctorBot()">
            The Doctor
        </button>

        <button class="tool-btn" onclick="openTravelAI()">
            Travel Route Architect
        </button>

        <button class="close-btn" onclick="closeTools()">
            Close
        </button>

    </div>

</div>

<!-- TRAVEL AI POPUP -->

<div id="travelPopup" class="iframe-popup">

    <div class="iframe-top">

        <h2>Travel Route Architect</h2>

        <button onclick="closeTravelAI()">
            Close
        </button>

    </div>

    <iframe
    src="https://chatbot.getmindpal.com/travel-route-architect-so0">
    </iframe>

</div>

<!-- FOOTER -->

<footer>

    <p>
        © 2026 Nova AI
    </p>

</footer>

<!-- JAVASCRIPT -->

<script>

const popup =
document.getElementById("toolsPopup");

const startBtn =
document.getElementById("startBtn");

const travelPopup =
document.getElementById("travelPopup");

/* OPEN TOOL MENU */

startBtn.addEventListener("click", function(){

    popup.style.display = "flex";

});

/* CLOSE TOOL MENU */

function closeTools(){

    popup.style.display = "none";

}

/* OPEN DOCTOR BOT */

function openDoctorBot(){

    closeTools();

    if(window.chatbase){

        window.chatbase("open");

    } else {

        alert("Doctor AI is loading...");

    }

}

/* OPEN TRAVEL AI INSIDE WEBSITE */

function openTravelAI(){

    closeTools();

    travelPopup.style.display = "block";

}

/* CLOSE TRAVEL AI */

function closeTravelAI(){

    travelPopup.style.display = "none";

}

</script>

<!-- CHATBASE -->

<script>
(function(){

if(!window.chatbase || window.chatbase("getState") !== "initialized"){

window.chatbase=(...arguments)=>{
if(!window.chatbase.q){
window.chatbase.q=[]
}
window.chatbase.q.push(arguments)
};

window.chatbase=new Proxy(window.chatbase,{
get(target,prop){
if(prop==="q"){
return target.q
}
return(...args)=>target(prop,...args)
}
});
}

const onLoad=function(){

const script=document.createElement("script");

script.src="https://www.chatbase.co/embed.min.js";

script.id="kxemaNl6VFrXMQkBX8iwb";

script.domain="www.chatbase.co";

document.body.appendChild(script);

};

document.addEventListener("DOMContentLoaded", onLoad);

})();
</script>

</body>
</html>
